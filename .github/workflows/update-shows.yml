name: Update tour dates

on:
  schedule:
    # every 6 hours (offset a few minutes to avoid the top-of-hour rush)
    - cron: "17 */6 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch shows from Bandsintown
        run: |
          cat > fetch-shows.mjs <<'EOF'
          import { writeFileSync } from "fs";

          const PAGE = "https://www.bandsintown.com/a/2356753-eggy";

          const r = await fetch(PAGE, {
            headers: {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36",
              "Accept": "text/html"
            }
          });
          if (!r.ok) {
            console.error("Page responded HTTP " + r.status);
            throw new Error("Bandsintown page HTTP " + r.status);
          }
          const html = await r.text();

          /* Bandsintown embeds the full schedule as schema.org JSON-LD */
          const blocks = [...html.matchAll(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/g)];
          console.log("Found " + blocks.length + " JSON-LD block(s)");

          const events = [];
          for (const b of blocks) {
            try {
              const data = JSON.parse(b[1]);
              const items = Array.isArray(data) ? data : [data];
              for (const item of items) {
                const t = [].concat(item["@type"] || []);
                if (t.includes("MusicEvent") || t.includes("Event")) events.push(item);
              }
            } catch { /* skip unparseable blocks */ }
          }
          console.log("Parsed " + events.length + " event entries");

          const shows = events
            .filter(e => e.startDate && e.location && e.location.geo &&
                         e.location.geo.latitude != null && e.location.geo.longitude != null)
            .map(e => ({
              date: String(e.startDate).slice(0, 10),
              venue: e.location.name || (e.name || "TBA"),
              city: (e.location.address && e.location.address.addressLocality) || "",
              state: (e.location.address && (e.location.address.addressRegion || e.location.address.addressCountry)) || "",
              lat: parseFloat(e.location.geo.latitude),
              lng: parseFloat(e.location.geo.longitude),
              tickets: (e.offers && [].concat(e.offers)[0] && [].concat(e.offers)[0].url) || e.url || null,
              festival: /festival|fest|forest|hulaween|jam\b/i.test((e.name || "") + " " + (e.location.name || ""))
            }));

          /* dedupe (same date + venue) and sort chronologically */
          const seen = new Set();
          const unique = shows.filter(s => {
            const k = s.date + "|" + s.venue;
            if (seen.has(k)) return false;
            seen.add(k);
            return true;
          }).sort((a, b) => a.date.localeCompare(b.date));

          if (unique.length === 0) {
            throw new Error("Parsed 0 shows — page structure may have changed. Not overwriting shows.json.");
          }

          writeFileSync("shows.json", JSON.stringify({
            updated: new Date().toISOString(),
            source: "bandsintown-page",
            shows: unique
          }, null, 2));

          console.log("Wrote " + unique.length + " shows to shows.json");
          EOF
          node fetch-shows.mjs
          rm fetch-shows.mjs

      - name: Commit if changed
        run: |
          git config user.name "tour-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shows.json
          if ! git diff --cached --quiet; then
            git commit -m "Update tour dates"
            git push
          else
            echo "No changes to tour dates."
          fi
