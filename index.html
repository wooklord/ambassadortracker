
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambassadors — Eggy Tour Map</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%2034%2044%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M17%201C24.5%201%2032%2014%2032%2025.5%2032%2034.6%2025.3%2041%2017%2041%208.7%2041%202%2034.6%202%2025.5%202%2014%209.5%201%2017%201Z%22%20fill%3D%22%23FDF8EF%22%20stroke%3D%22%233B2E1E%22%20stroke-width%3D%222.2%22/%3E%3Ccircle%20cx%3D%2217%22%20cy%3D%2226%22%20r%3D%227.5%22%20fill%3D%22%23F5A623%22%20stroke%3D%22%23E08A00%22%20stroke-width%3D%221.5%22/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --yolk:#F5A623;
    --yolk-deep:#E08A00;
    --shell:#FDF8EF;
    --ink:#3B2E1E;
    --ink-soft:#7A6A54;
    --line:#E8DCC8;
    --going:#2E7D6E;
    --tomato:#E4572E;
    --card:#FFFFFF;
    --radius:14px;
    --font-display:"Fraunces", Georgia, serif;
    --font-body:"Nunito Sans", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--shell);
    overflow:hidden;
  }

  /* ---------- Layout ---------- */
  #app{display:grid;grid-template-columns:370px 1fr;height:100%}
  #mapwrap{position:relative;min-height:0;height:100%}
  #sidebar{
    background:var(--shell);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    min-height:0;
    z-index:500;
  }
  #map{height:100%;width:100%;background:#EAE3D2}

  /* ---------- Header ---------- */
  header{padding:18px 20px 12px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{flex:0 0 auto;filter:drop-shadow(0 2px 2px rgba(59,46,30,.2))}
  header h1{
    font-family:var(--font-display);
    font-weight:800;font-size:1.7rem;letter-spacing:-.02em;line-height:1.05;
  }
  header h1 .egg{color:var(--yolk-deep)}
  header .sub{margin-top:4px;font-size:.8rem;color:var(--ink-soft);font-weight:600}
  #datasource{
    display:inline-block;margin-top:10px;font-size:.68rem;font-weight:800;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);
    background:#F3EAD8;border:1px solid var(--line);border-radius:999px;padding:3px 10px;
  }
  #datasource.live{color:var(--going);border-color:#BFDCD5;background:#E8F3F0}

  /* ---------- Show list ---------- */
  #shows{flex:1;overflow-y:auto;padding:10px 12px 24px;min-height:0}
  .show{
    display:flex;gap:12px;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:11px 13px;margin-bottom:9px;cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .show:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,46,30,.10)}
  .show.active{border-color:var(--yolk);box-shadow:0 0 0 2px rgba(245,166,35,.35)}
  .show.past{opacity:.6}
  .show.past .date-chip .mon{color:var(--ink-soft)}
  .show:focus-visible{outline:3px solid var(--yolk);outline-offset:2px}
  .date-chip{
    flex:0 0 52px;text-align:center;background:var(--shell);
    border:1px solid var(--line);border-radius:10px;padding:6px 2px;
  }
  .date-chip .mon{display:block;font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tomato)}
  .date-chip .day{display:block;font-family:var(--font-display);font-weight:800;font-size:1.25rem;line-height:1.1}
  .show .meta{min-width:0}
  .show .venue{font-weight:800;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .show .city{font-size:.78rem;color:var(--ink-soft);font-weight:600}
  .show .fest{
    display:inline-block;margin-top:3px;font-size:.62rem;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:var(--yolk-deep);background:#FCEFD4;border-radius:6px;padding:2px 7px;
  }
  .leg{
    display:flex;align-items:center;gap:8px;justify-content:center;
    margin:-3px 0 6px;padding:2px 0;
    font-size:.7rem;font-weight:800;color:var(--ink-soft);letter-spacing:.03em;
  }
  .leg::before,.leg::after{
    content:"";flex:0 0 26px;border-top:2px dashed #D9CDBA;
  }
  .leg .mi{color:var(--yolk-deep)}
  .leg a{color:var(--yolk-deep);text-decoration:none;border-bottom:1px dotted var(--yolk-deep)}
  .leg a:hover{border-bottom-style:solid}
  .leg a:focus-visible{outline:3px solid var(--yolk)}
  .empty-note{padding:20px;text-align:center;color:var(--ink-soft);font-size:.85rem}

  /* ---------- Detail drawer ---------- */
  #drawer{
    position:absolute;top:0;right:0;height:100%;width:400px;max-width:100%;
    background:var(--card);border-left:1px solid var(--line);
    transform:translateX(105%);transition:transform .22s ease;
    z-index:900;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(59,46,30,.12);
  }
  #drawer.open{transform:translateX(0)}
  #drawer .head{
    padding:20px 20px 14px;border-bottom:3px solid var(--yolk);
    background:linear-gradient(180deg,#FFF8EA, #FFFFFF);
  }
  #drawer .head .when{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--tomato)}
  #drawer .head h2{font-family:var(--font-display);font-weight:800;font-size:1.35rem;line-height:1.15;margin-top:4px}
  #drawer .head .where{margin-top:4px;font-weight:700;color:var(--ink-soft);font-size:.88rem}
  #closeDrawer{
    position:absolute;top:12px;right:12px;border:1px solid var(--line);background:var(--shell);
    width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;color:var(--ink);
    font-weight:800;line-height:1;
  }
  #closeDrawer:focus-visible{outline:3px solid var(--yolk)}

  .tabs{display:flex;border-bottom:1px solid var(--line)}
  .tab{
    flex:1;padding:10px 0;background:none;border:none;cursor:pointer;
    font-family:var(--font-body);font-weight:800;font-size:.78rem;letter-spacing:.05em;
    text-transform:uppercase;color:var(--ink-soft);border-bottom:3px solid transparent;
  }
  .tab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--yolk)}
  .tab:focus-visible{outline:3px solid var(--yolk);outline-offset:-3px}
  .panel{flex:1;overflow-y:auto;padding:16px 20px 28px;display:none}
  .panel.on{display:block}

  .row{margin-bottom:14px}
  .row .lbl{font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:3px}
  .row .val{font-weight:700;font-size:.92rem}

  .btn{
    display:block;width:100%;text-align:center;text-decoration:none;
    font-weight:800;font-size:.9rem;border-radius:12px;padding:12px;margin-bottom:10px;
    border:1px solid var(--line);color:var(--ink);background:var(--shell);cursor:pointer;
    font-family:var(--font-body);
    transition:transform .1s ease;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:focus-visible{outline:3px solid var(--yolk)}
  .btn.primary{background:var(--yolk);border-color:var(--yolk-deep);color:#2B1F0E}
  .btn.primary:hover{background:#FFB238}
  .hint{font-size:.75rem;color:var(--ink-soft);line-height:1.45;margin-top:6px}

  /* ---------- Crew tab ---------- */
  .rsvp-btns{display:flex;gap:8px;margin-bottom:6px}
  .rsvp{
    flex:1;padding:10px 0;border-radius:12px;border:1px solid var(--line);
    background:var(--shell);font-family:var(--font-body);font-weight:800;font-size:.82rem;cursor:pointer;color:var(--ink);
  }
  .rsvp:focus-visible{outline:3px solid var(--yolk)}
  .rsvp.sel-going{background:var(--going);border-color:var(--going);color:#fff}
  .rsvp.sel-maybe{background:var(--yolk);border-color:var(--yolk-deep);color:#2B1F0E}
  .rsvp.sel-out{background:#D9CDBA;border-color:#C4B69F;color:var(--ink)}
  textarea.note{
    width:100%;border:1px solid var(--line);border-radius:12px;background:var(--shell);
    font-family:var(--font-body);font-size:.85rem;color:var(--ink);padding:10px;resize:vertical;min-height:70px;
  }
  textarea.note:focus-visible{outline:3px solid var(--yolk)}
  .phase2{
    margin-top:16px;border:1px dashed var(--yolk-deep);border-radius:12px;background:#FFF6E3;
    padding:12px;font-size:.78rem;line-height:1.5;color:var(--ink);
  }
  .phase2 b{color:var(--yolk-deep)}

  /* ---------- Route arrows & venue photo ---------- */
  .route-arrow{pointer-events:none}
  #dPhoto img{width:100%;height:140px;object-fit:cover;display:block}

  /* ---------- Egg pin ---------- */
  .egg-pin{filter:drop-shadow(0 2px 3px rgba(59,46,30,.35))}
  .egg-pin svg{transition:transform .12s ease;transform-origin:50% 100%}
  .egg-pin:hover svg,.egg-pin.hot svg{transform:scale(1.18)}
  .egg-pin.soon svg{animation:hatch 1.6s ease-in-out infinite;transform-origin:50% 100%}
  .egg-pin.soon.today svg{animation-duration:.8s}   /* showday: 2x heartbeat, re-syncs cleanly with the 1.6s pulsers */
  @keyframes hatch{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.12) rotate(-3deg)}
  }

  /* ---------- Legend ---------- */
  #legend{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
  }
  #legend .li{display:flex;align-items:center;gap:4px;font-size:.65rem;font-weight:800;color:var(--ink-soft);letter-spacing:.03em;text-transform:uppercase}
  #legend svg{width:15px;height:19px}

  /* ---------- Mobile ---------- */
  #listToggle{display:none}
  @media (max-width:820px){
    /* hard page-scroll lock: the page itself can never move */
    html,body{position:fixed;inset:0;width:100%;overflow:hidden}
    #app{grid-template-columns:1fr}
    #sidebar{
      position:fixed;left:0;right:0;bottom:0;top:auto;
      height:72vh;                     /* plain vh: works everywhere */
      border-right:none;
      border-top:1px solid var(--line);border-radius:18px 18px 0 0;
      transform:translateY(calc(100% - 195px));transition:transform .22s ease;
      box-shadow:0 -8px 30px rgba(59,46,30,.15);
      overflow:hidden;                 /* #shows is the one and only scroller */
      z-index:800;
    }
    #sidebar.up{transform:translateY(0)}
    /* collapsed sheet: the list must not scroll or eat taps behind the peek */
    #sidebar:not(.up) #shows{overflow:hidden;pointer-events:none}
    #shows{
      overscroll-behavior:contain;      /* scroll stays in the list */
      -webkit-overflow-scrolling:touch;
      touch-action:pan-y;
    }
    #listToggle{
      display:block;width:44px;height:5px;border-radius:99px;background:#D9CDBA;
      border:none;margin:8px auto 0;cursor:pointer;
    }
    header{padding-top:6px;cursor:pointer}
    #drawer{width:100%;position:fixed;z-index:900}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <button id="listToggle" aria-label="Expand or collapse show list"></button>
    <header>
      <div class="brand">
        <svg class="logo" width="34" height="44" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17 1C24.5 1 32 14 32 25.5 32 34.6 25.3 41 17 41 8.7 41 2 34.6 2 25.5 2 14 9.5 1 17 1Z"
                fill="#FDF8EF" stroke="#3B2E1E" stroke-width="2.2"/>
          <circle cx="17" cy="26" r="7.5" fill="#F5A623" stroke="#E08A00" stroke-width="1.5"/>
        </svg>
        <h1>Ambassadors</h1>
      </div>
      <div class="sub">Eggy tour map &amp; crew planner</div>
      <div id="legend" aria-label="Pin legend"></div>
      <span id="datasource">loading dates…</span>
    </header>
    <div id="shows" role="list"></div>
  </aside>

  <div id="mapwrap">
    <div id="map"></div>

    <section id="drawer" aria-label="Show details">
      <div id="dPhoto"></div>
      <div class="head">
        <div class="when" id="dWhen"></div>
        <h2 id="dVenue"></h2>
        <div class="where" id="dCity"></div>
        <button id="closeDrawer" aria-label="Close details">✕</button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true" data-panel="pShow">Show</button>
        <button class="tab" role="tab" aria-selected="false" data-panel="pLodging">Lodging</button>
        <button class="tab" role="tab" aria-selected="false" data-panel="pCrew">Crew</button>
      </div>
      <div class="panel on" id="pShow"></div>
      <div class="panel" id="pLodging"></div>
      <div class="panel" id="pCrew"></div>
    </section>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* =========================================================
   Eggy Tour Map — Phase 1
   - Live dates from Bandsintown public API (auto-updates,
     cancellations drop off automatically on each page load)
   - Fallback list below if the API is unreachable
   - Lodging deep links pre-filled with each show's dates
   - Crew tab: RSVP + notes saved on this device only
     (Phase 2 swaps this for a shared Supabase backend)
   ========================================================= */

const BIT_ARTIST = "id_2356753";           // Eggy on Bandsintown
const BIT_APP_ID = "eggy-crew-map";        // public API identifier (any string)

/* ---- Fallback dates (edit freely; used only if the API call fails) ---- */
const FALLBACK = [
  {date:"2026-07-11", venue:"Levitt Pavilion for the Performing Arts", city:"Westport", state:"CT", lat:41.1415, lng:-73.3579},
  {date:"2026-07-15", venue:"24th Street Park (free show)", city:"Virginia Beach", state:"VA", lat:36.8572, lng:-75.9766},
  {date:"2026-07-23", venue:"Union Craft Brewing", city:"Baltimore", state:"MD", lat:39.3307, lng:-76.6447},
  {date:"2026-07-26", venue:"Lewes Ferry Grounds", city:"Lewes", state:"DE", lat:38.7818, lng:-75.1177},
  {date:"2026-07-31", venue:"Eggy — Boston Late Night (21+)", city:"Boston", state:"MA", lat:42.3601, lng:-71.0589},
  {date:"2026-08-01", venue:"Eggy — Boston Late Night (21+)", city:"Boston", state:"MA", lat:42.3601, lng:-71.0589},
  {date:"2026-10-16", venue:"TBA", city:"Cleveland", state:"OH", lat:41.4993, lng:-81.6944},
  {date:"2026-10-17", venue:"TBA", city:"Detroit", state:"MI", lat:42.3314, lng:-83.0458},
  {date:"2026-10-18", venue:"TBA", city:"Madison", state:"WI", lat:43.0731, lng:-89.4012},
  {date:"2026-10-22", venue:"Suwannee Hulaween", city:"Live Oak", state:"FL", lat:30.2952, lng:-82.9840, festival:true, endDate:"2026-10-25"}
];

/* ---------- Map ---------- */
const map = L.map("map", {zoomControl:false}).setView([39.5, -84], 5);
L.control.zoom({position:"bottomright"}).addTo(map);
const routeLayer = L.layerGroup().addTo(map);
/* Primary tiles: CARTO Voyager. If those are blocked (ad blocker /
   web filter), fall back to openstreetmap.org automatically. */
let tileErrors = 0, tilesSwapped = false;
const osmFallback = () => L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom:19
}).addTo(map);
const cartoLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom:19
}).addTo(map);
cartoLayer.on("tileerror", ()=>{
  tileErrors++;
  if(tileErrors >= 3 && !tilesSwapped){
    tilesSwapped = true;
    console.warn("CARTO tiles unreachable — switching to openstreetmap.org");
    map.removeLayer(cartoLayer);
    osmFallback();
  }
});

/* Egg "hatches" as the show gets closer:
   tier 0 = this week / happening now (big crack, pulsing)
   tier 1 = this month, tier 2 = next 3 months, tier 3 = later
   tier 4 = played (hatched chick, lingers for 30 days after the show) */
const todayStr = () => new Date().toISOString().slice(0,10);
const daysUntil = d => Math.ceil((new Date(d+"T12:00:00") - new Date()) / 86400000);
const isPast = show => (show.endDate || show.date) < todayStr();
const isToday = show => show.date <= todayStr() && todayStr() <= (show.endDate || show.date);
const tierOf = show => {
  if(isPast(show)) return 4;
  const n = daysUntil(show.date);
  return n<=7 ? 0 : n<=30 ? 1 : n<=90 ? 2 : 3;
};

const eggSVG = (tier)=>{
  if(tier===4){
    /* hatched: chick sitting in the cracked bottom shell */
    return `
<svg width="34" height="44" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <circle cx="17" cy="15" r="8.5" fill="#FFD23F" stroke="#3B2E1E" stroke-width="2"/>
  <circle cx="14" cy="13.5" r="1.2" fill="#3B2E1E"/>
  <circle cx="20" cy="13.5" r="1.2" fill="#3B2E1E"/>
  <path d="M17 15.5 L14.8 18.5 L19.2 18.5 Z" fill="#E08A00" stroke="#3B2E1E" stroke-width="0.8"/>
  <path d="M2 25.5 C2 34.6 8.7 41 17 41 C25.3 41 32 34.6 32 25.5 L32 23.5 L28 20 L24 24 L20 20 L16 24 L12 20 L8 24 L4 20 L2 23.5 Z"
        fill="#FDF8EF" stroke="#3B2E1E" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M17 41 L17 43.5" stroke="#3B2E1E" stroke-width="2.2"/>
</svg>`;
  }
  const shell = tier===3 ? "#F1E9D8" : "#FDF8EF";
  const stroke = tier===3 ? "#8A7A62" : "#3B2E1E";
  const cracks = [
    /* t0: big dramatic crack, nearly splitting the shell */
    `<path d="M9 10 L14 14 L11 18 L17 22 L14 26 L19 29" fill="none" stroke="${stroke}" stroke-width="2.2" stroke-linejoin="round"/>`,
    /* t1: big zigzag crack */
    `<path d="M12 12 L16 15 L14 18 L18 21" fill="none" stroke="${stroke}" stroke-width="1.9" stroke-linejoin="round"/>`,
    /* t2: hairline crack */
    `<path d="M14 11 L17 14 L15.5 17" fill="none" stroke="${stroke}" stroke-width="1.3" stroke-linejoin="round"/>`,
    /* t3: smooth */
    ``
  ][tier];
  return `
<svg width="34" height="44" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M17 1C24.5 1 32 14 32 25.5 32 34.6 25.3 41 17 41 8.7 41 2 34.6 2 25.5 2 14 9.5 1 17 1Z"
        fill="${shell}" stroke="${stroke}" stroke-width="2.2"/>
  ${cracks}
  <path d="M17 41 L17 43.5" stroke="${stroke}" stroke-width="2.2"/>
</svg>`;
};

const eggIcon = (tier=3, hot=false, stack=0, today=false)=>L.divIcon({
  className:"egg-pin"+(hot?" hot":"")+(tier===0?" soon":"")+(today?" today":""),
  html:eggSVG(tier),
  iconSize:[34,44],
  /* shows at the same venue fan out up-and-right in screen space */
  iconAnchor:[17 - stack*10, 43 + stack*8],
  popupAnchor:[0,-40]
});

/* ---------- Helpers ---------- */
const fmtLong = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long", month:"long", day:"numeric", year:"numeric"});
const fmtChip = d => {
  const dt = new Date(d+"T12:00:00");
  return {mon:dt.toLocaleDateString("en-US",{month:"short"}), day:dt.getDate()};
};
const addDays = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---- Distance helpers ---- */
const haversineMi = (a,b)=>{
  const R=3958.8, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
};
const fmtDur = s => {
  const h=Math.floor(s/3600), m=Math.round((s%3600)/60);
  return h ? `${h}h ${m}m` : `${m}m`;
};

function lodgingLinks(show){
  const checkin  = show.date;
  const checkout = show.endDate ? addDays(show.endDate,1) : addDays(show.date,1);
  const place = `${show.city}--${show.state}--United-States`;
  return {
    airbnb: `https://www.airbnb.com/s/${encodeURIComponent(place)}/homes?checkin=${checkin}&checkout=${checkout}&adults=4`,
    booking:`https://www.booking.com/searchresults.html?ss=${encodeURIComponent(show.city+", "+show.state)}&checkin=${checkin}&checkout=${checkout}&group_adults=4`,
    hotelsNear:`https://www.google.com/maps/search/${encodeURIComponent("hotels near "+show.venue+" "+show.city+" "+show.state)}`
  };
}
const ticketSearch = show => `https://www.google.com/search?q=${encodeURIComponent("Eggy tickets "+show.venue+" "+show.city+" "+show.date)}`;
const legDirections = (a,b) => `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(a.venue+", "+a.city+", "+a.state)}&destination=${encodeURIComponent(b.venue+", "+b.city+", "+b.state)}`;
const calLink = show => {
  const s = show.date.replace(/-/g,"");
  const e = addDays(show.endDate || show.date,1).replace(/-/g,"");
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Eggy — "+show.venue+", "+show.city)}&dates=${s}/${e}`;
};

/* ---------- State ---------- */
let SHOWS = [];
let markers = [];
let activeIdx = null;

/* ---------- Data loading ----------
   Priority: 1) shows.json mirrored into this repo by the GitHub Action
                (same-origin — ad blockers and web filters can't touch it)
             2) live Bandsintown API call
             3) embedded fallback list */
async function loadShows(){
  const badge = document.getElementById("datasource");
  const today = todayStr();
  const cutoff = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);

  /* 1) Repo mirror */
  try{
    const r = await fetch("shows.json", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    if(!data.shows || !data.shows.length) throw new Error("empty mirror");
    SHOWS = data.shows.filter(s => (s.endDate || s.date) >= cutoff);
    const upd = new Date(data.updated).toLocaleDateString("en-US",{month:"short",day:"numeric"});
    badge.textContent = "auto-updated " + upd;
    badge.classList.add("live");
    render();
    return;
  }catch(err){
    console.warn("shows.json unavailable (Action not set up yet, or empty):", err.message);
  }

  /* 2) Live Bandsintown */
  try{
    const r = await fetch(`https://rest.bandsintown.com/artists/${BIT_ARTIST}/events?app_id=${BIT_APP_ID}`);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const events = await r.json();
    if(!Array.isArray(events) || events.length===0) throw new Error("empty");
    SHOWS = events
      .filter(e => e.venue && e.venue.latitude && e.venue.longitude)
      .map(e => ({
        date: e.datetime.slice(0,10),
        venue: e.venue.name,
        city: e.venue.city,
        state: e.venue.region || e.venue.country,
        lat: parseFloat(e.venue.latitude),
        lng: parseFloat(e.venue.longitude),
        tickets: (e.offers && e.offers[0] && e.offers[0].url) || e.url || null,
        festival: /festival|fest|forest|hulaween|jam\b/i.test(e.title || e.venue.name)
      }))
      .sort((a,b)=>a.date.localeCompare(b.date));
    badge.textContent = "live · bandsintown";
    badge.classList.add("live");
  }catch(err){
    console.warn("Bandsintown fetch failed (ad blocker or web filter likely):", err);
    /* 3) Embedded fallback */
    SHOWS = FALLBACK.filter(s => (s.endDate || s.date) >= cutoff);
    badge.textContent = "cached dates · check eggymusic.com/tour";
  }
  render();
}

/* ---------- Render ---------- */
function render(){
  const list = document.getElementById("shows");
  list.innerHTML = "";
  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  if(SHOWS.length===0){
    list.innerHTML = `<div class="empty-note">No upcoming shows found. Check <a href="https://eggymusic.com/tour/">eggymusic.com/tour</a>.</div>`;
    return;
  }

  const bounds = [];
  const coordCount = {};
  SHOWS.forEach((show,i)=>{
    const ck = show.lat.toFixed(5)+","+show.lng.toFixed(5);
    show._stack = coordCount[ck] || 0;
    coordCount[ck] = show._stack + 1;
    const tier = tierOf(show);
    const chip = fmtChip(show.date);
    const el = document.createElement("div");
    el.className = "show" + (tier===4 ? " past" : "");
    el.setAttribute("role","listitem");
    el.setAttribute("tabindex","0");
    el.innerHTML = `
      <div class="date-chip"><span class="mon">${chip.mon}</span><span class="day">${chip.day}</span></div>
      <div class="meta">
        <div class="venue">${esc(show.venue)}</div>
        <div class="city">${esc(show.city)}, ${esc(show.state)}</div>
        ${tier===4 ? '<span class="fest">Hatched</span>' : show.festival ? '<span class="fest">Festival run</span>' : ''}
      </div>`;
    el.addEventListener("click", ()=>select(i,true));
    el.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();select(i,true);} });
    list.appendChild(el);

    /* Leg row to the next show — only when it's a drivable run
       (next show within 2 days) and neither show has already happened. */
    if(i < SHOWS.length-1){
      const next = SHOWS[i+1];
      const gapDays = (new Date(next.date) - new Date(show.endDate || show.date)) / 86400000;
      if(gapDays <= 2 && !isPast(show) && !isPast(next)){
        const direct = haversineMi(show, next);
        const leg = document.createElement("div");
        leg.className = "leg";
        leg.id = "leg-"+i;
        leg.innerHTML = direct < 1
          ? `same spot as last show`
          : `↓ <span class="mi">~${Math.round(direct)} mi</span> direct · <a href="${legDirections(show, next)}" target="_blank" rel="noopener">Maps</a>`;
        list.appendChild(leg);
      }
    }

    const m = L.marker([show.lat, show.lng], {
      icon:eggIcon(tier, false, show._stack, isToday(show)),
      title:`${show.venue} — ${show.date}`,
      zIndexOffset: -show._stack * 100   /* later duplicates tuck behind */
    }).addTo(map);
    m.on("click", ()=>select(i,false));
    markers.push(m);
    bounds.push([show.lat, show.lng]);
  });

  /* start the list at the first upcoming show, past chicks scrolled above */
  const firstUpcoming = SHOWS.findIndex(s => !isPast(s));
  if(firstUpcoming > 0){
    const card = list.querySelectorAll(".show")[firstUpcoming];
    if(card) list.scrollTop = card.offsetTop - list.offsetTop;
  }

  if(bounds.length) map.fitBounds(bounds, {padding:[50,50]});
  buildRoute();
}

/* Compass bearing (degrees) from point a to b, each [lat,lng] */
function bearing(a, b){
  const toR = x=>x*Math.PI/180;
  const dLng = toR(b[1]-a[1]);
  const y = Math.sin(dLng)*Math.cos(toR(b[0]));
  const x = Math.cos(toR(a[0]))*Math.sin(toR(b[0])) - Math.sin(toR(a[0]))*Math.cos(toR(b[0]))*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* Place small direction chevrons at 25/50/75% along a route's geometry */
function addArrows(latlngs){
  if(latlngs.length < 2) return;
  const cum = [0];
  for(let i=1;i<latlngs.length;i++){
    cum.push(cum[i-1] + haversineMi(
      {lat:latlngs[i-1][0], lng:latlngs[i-1][1]},
      {lat:latlngs[i][0],   lng:latlngs[i][1]}
    ));
  }
  const total = cum[cum.length-1];
  if(total === 0) return;

  [0.25, 0.5, 0.75].forEach(f=>{
    const target = total * f;
    let i = cum.findIndex(c => c >= target);
    if(i < 1) i = 1;
    const p = latlngs[i-1], q = latlngs[i];
    const brg = bearing(p, q);
    L.marker([(p[0]+q[0])/2, (p[1]+q[1])/2], {
      icon: L.divIcon({
        className:"route-arrow",
        html:`<svg width="26" height="26" viewBox="0 0 14 14" style="transform:rotate(${brg}deg)" aria-hidden="true"><path d="M7 1 L12 11.5 L7 9 L2 11.5 Z" fill="#E08A00" opacity="0.9"/></svg>`,
        iconSize:[26,26], iconAnchor:[13,13]
      }),
      interactive:false, keyboard:false
    }).addTo(routeLayer);
  });
}

/* ---------- Tour route: driving directions for drivable runs ----------
   Shows are chained into "runs" where each next show is within 2 days.
   Each run gets one OSRM request; isolated shows get no line at all. */
function drivableRuns(){
  const runs = [];
  let run = [0];
  for(let i=0;i<SHOWS.length-1;i++){
    const gapDays = (new Date(SHOWS[i+1].date) - new Date(SHOWS[i].endDate || SHOWS[i].date)) / 86400000;
    if(gapDays <= 2 && !isPast(SHOWS[i]) && !isPast(SHOWS[i+1])){ run.push(i+1); }
    else { if(run.length>1) runs.push(run); run=[i+1]; }
  }
  if(run.length>1) runs.push(run);
  return runs;
}

async function buildRoute(){
  routeLayer.clearLayers();
  if(SHOWS.length < 2) return;

  const routeStyle = {color:"#E08A00", weight:3, opacity:.85, dashArray:"7 9"};
  const runs = drivableRuns();

  for(const run of runs){
    try{
      const coords = run.map(i=>`${SHOWS[i].lng},${SHOWS[i].lat}`).join(";");
      const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
      if(!r.ok) throw new Error("HTTP "+r.status);
      const data = await r.json();
      if(data.code !== "Ok" || !data.routes || !data.routes[0]) throw new Error(data.code || "no route");
      const route = data.routes[0];

      L.geoJSON(route.geometry, {style:routeStyle}).addTo(routeLayer);
      addArrows(route.geometry.coordinates.map(c => [c[1], c[0]]));

      route.legs.forEach((leg,j)=>{
        const el = document.getElementById("leg-"+run[j]);
        if(!el) return;
        const mi = leg.distance/1609.34;
        el.innerHTML = mi < 1
          ? `same spot as last show`
          : `🚗 <span class="mi">${Math.round(mi)} mi</span> · ${fmtDur(leg.duration)} · <a href="${legDirections(SHOWS[run[j]], SHOWS[run[j+1]])}" target="_blank" rel="noopener">Maps</a>`;
      });
    }catch(err){
      console.warn("OSRM routing unreachable — straight lines for this run:", err);
      for(let j=0;j<run.length-1;j++){
        const a = [SHOWS[run[j]].lat, SHOWS[run[j]].lng];
        const b = [SHOWS[run[j+1]].lat, SHOWS[run[j+1]].lng];
        L.polyline([a, b], routeStyle).addTo(routeLayer);
        addArrows([a, b]);
      }
      /* leg rows already show the straight-line estimates from render() */
    }
  }
}

/* ---------- Selection & drawer ---------- */
function select(i, fly){
  activeIdx = i;
  const show = SHOWS[i];
  document.querySelectorAll(".show").forEach((el,j)=>el.classList.toggle("active", j===i));
  markers.forEach((m,j)=>m.setIcon(eggIcon(tierOf(SHOWS[j]), j===i, SHOWS[j]._stack, isToday(SHOWS[j]))));
  if(fly) map.flyTo([show.lat, show.lng], Math.max(map.getZoom(), 9), {duration:.7});

  document.getElementById("dWhen").textContent = fmtLong(show.date) + (show.endDate ? " – " + fmtLong(show.endDate) : "");
  document.getElementById("dVenue").textContent = show.venue;
  document.getElementById("dCity").textContent = `${show.city}, ${show.state}`;

  document.getElementById("dPhoto").innerHTML = show.photo
    ? `<img src="${esc(show.photo)}" alt="${esc(show.venue)}" onerror="this.parentNode.innerHTML=''">`
    : "";

  const L2 = lodgingLinks(show);

  document.getElementById("pShow").innerHTML = `
    <div class="row"><div class="lbl">Date</div><div class="val">${fmtLong(show.date)}${show.endDate ? " → "+fmtLong(show.endDate):""}</div></div>
    <div class="row"><div class="lbl">Venue</div><div class="val">${esc(show.venue)}<br><span style="font-weight:600;color:var(--ink-soft)">${esc(show.city)}, ${esc(show.state)}</span></div></div>
    <a class="btn primary" href="${show.tickets || ticketSearch(show)}" target="_blank" rel="noopener">${show.tickets ? "Get tickets" : "Search tickets"}</a>
    <a class="btn" href="${calLink(show)}" target="_blank" rel="noopener">Add to Google Calendar</a>
    <a class="btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(show.venue+", "+show.city+", "+show.state)}" target="_blank" rel="noopener">Venue on Google Maps</a>
    <a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(show.venue+", "+show.city+", "+show.state)}" target="_blank" rel="noopener">Directions to venue</a>
    <p class="hint">Dates refresh from Bandsintown every time this page loads, so new announcements appear and cancellations drop off automatically. Always confirm against <a href="https://eggymusic.com/tour/" target="_blank" rel="noopener">eggymusic.com/tour</a> before booking travel.</p>`;

  document.getElementById("pLodging").innerHTML = `
    <div class="row"><div class="lbl">Stay dates</div><div class="val">Check in ${fmtLong(show.date)} · check out ${fmtLong(show.endDate ? addDays(show.endDate,1) : addDays(show.date,1))}</div></div>
    <a class="btn primary" href="${L2.airbnb}" target="_blank" rel="noopener">Airbnbs with these dates</a>
    <a class="btn" href="${L2.booking}" target="_blank" rel="noopener">Hotels on Booking.com</a>
    <a class="btn" href="${L2.hotelsNear}" target="_blank" rel="noopener">Hotels near the venue (map)</a>
    <div class="row" style="margin-top:18px"><div class="lbl">Pre-show fuel</div></div>
    <a class="btn" href="https://www.google.com/maps/search/${encodeURIComponent("pizza near "+show.venue+" "+show.city+" "+show.state)}" target="_blank" rel="noopener">🍕 Pizza near the venue</a>
    <a class="btn" href="https://www.google.com/maps/search/${encodeURIComponent("burgers near "+show.venue+" "+show.city+" "+show.state)}" target="_blank" rel="noopener">🍔 Burgers near the venue</a>
    <p class="hint">Lodging links open searches already filtered to this show's night and city, so only available places show up. Set the group size once you're there — it defaults to 4 adults.</p>`;

  renderCrew(show);

  document.getElementById("drawer").classList.add("open");
  if(window.innerWidth <= 820) document.getElementById("sidebar").classList.remove("up");
}

/* ---------- Crew tab (device-local until Phase 2) ---------- */
function crewKey(show){ return "eggy-crew-" + show.date + "-" + show.city; }

function renderCrew(show){
  const saved = JSON.parse(localStorage.getItem(crewKey(show)) || "{}");
  const p = document.getElementById("pCrew");
  p.innerHTML = `
    <div class="row"><div class="lbl">Your status</div>
      <div class="rsvp-btns">
        <button class="rsvp ${saved.rsvp==="going"?"sel-going":""}" data-v="going">Going</button>
        <button class="rsvp ${saved.rsvp==="maybe"?"sel-maybe":""}" data-v="maybe">Maybe</button>
        <button class="rsvp ${saved.rsvp==="out"?"sel-out":""}" data-v="out">Sitting out</button>
      </div>
    </div>
    <div class="row"><div class="lbl">Lodging &amp; logistics note</div>
      <textarea class="note" id="crewNote" placeholder="e.g. Booked 3-bed Airbnb near downtown, 2 spots open, arriving Friday noon">${esc(saved.note||"")}</textarea>
      <button class="btn" id="saveNote" style="margin-top:8px">Save note</button>
    </div>
    <div class="phase2">
      <b>Phase 2 — shared crew mode.</b> Right now your status and note save to this device only.
      Next step wires this tab to a free Supabase backend so the whole crew sees each other's
      RSVPs and lodging plans, plus a live chat thread per show.
    </div>`;

  p.querySelectorAll(".rsvp").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const cur = JSON.parse(localStorage.getItem(crewKey(show)) || "{}");
      cur.rsvp = btn.dataset.v;
      localStorage.setItem(crewKey(show), JSON.stringify(cur));
      renderCrew(show);
    });
  });
  p.querySelector("#saveNote").addEventListener("click", ()=>{
    const cur = JSON.parse(localStorage.getItem(crewKey(show)) || "{}");
    cur.note = p.querySelector("#crewNote").value;
    localStorage.setItem(crewKey(show), JSON.stringify(cur));
    p.querySelector("#saveNote").textContent = "Saved ✓";
    setTimeout(()=>{ const b=p.querySelector("#saveNote"); if(b) b.textContent="Save note"; }, 1400);
  });
}

/* ---------- Drawer chrome ---------- */
document.getElementById("closeDrawer").addEventListener("click", ()=>{
  document.getElementById("drawer").classList.remove("open");
  document.querySelectorAll(".show").forEach(el=>el.classList.remove("active"));
  markers.forEach((m,j)=>m.setIcon(eggIcon(tierOf(SHOWS[j]), false, SHOWS[j]._stack, isToday(SHOWS[j]))));
  activeIdx = null;
});
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected","false"));
    tab.setAttribute("aria-selected","true");
    document.querySelectorAll(".panel").forEach(pl=>pl.classList.remove("on"));
    document.getElementById(tab.dataset.panel).classList.add("on");
  });
});
document.getElementById("listToggle").addEventListener("click", ()=>{
  document.getElementById("sidebar").classList.toggle("up");
});
/* On phones the tiny pill is a hard target — let the whole header toggle too */
document.querySelector("header").addEventListener("click", (e)=>{
  if(window.innerWidth <= 820 && !e.target.closest("a")){
    document.getElementById("sidebar").classList.toggle("up");
  }
});

/* Bottom-sheet swipe gestures (mobile):
   collapsed + swipe up  -> expand
   expanded  + swipe down while list is at the top -> collapse */
(function(){
  const sb = document.getElementById("sidebar");
  const list = document.getElementById("shows");
  const mobile = () => window.innerWidth <= 820;
  let startY = null;
  sb.addEventListener("touchstart", e=>{ startY = e.touches[0].clientY; }, {passive:true});
  sb.addEventListener("touchmove", e=>{
    if(!mobile() || startY === null) return;
    const dy = e.touches[0].clientY - startY;
    if(!sb.classList.contains("up")){
      e.preventDefault();               /* nothing inside may scroll while collapsed */
      if(dy < -15){ sb.classList.add("up"); startY = null; }
    } else if(dy > 45 && list.scrollTop <= 0){
      sb.classList.remove("up"); startY = null;
    }
  }, {passive:false});
  sb.addEventListener("touchend", ()=>{ startY = null; }, {passive:true});
  /* any tap on the collapsed sheet expands it */
  sb.addEventListener("click", ()=>{
    if(mobile() && !sb.classList.contains("up")) sb.classList.add("up");
  });
})();

/* Version marker: confirm what's actually deployed (mobile caches lie) */
const BUILD = "v14";
document.querySelector(".sub").textContent += " · " + BUILD;
console.log("Ambassadors build " + BUILD);

/* Leaflet must re-measure its container whenever geometry settles or changes,
   otherwise it renders a degenerate world-view strip */
setTimeout(()=>{ map.invalidateSize(); if(markers.length) map.fitBounds(markers.map(m=>m.getLatLng()), {padding:[50,50]}); }, 400);
window.addEventListener("resize", ()=>map.invalidateSize());
window.addEventListener("orientationchange", ()=>setTimeout(()=>map.invalidateSize(), 250));

loadShows();

/* Legend: mini egg per tier */
document.getElementById("legend").innerHTML = [
  [0,"This week"],[1,"This month"],[2,"3 months"],[3,"Later"],[4,"Played"]
].map(([t,label])=>`<span class="li">${eggSVG(t).replace('width="34" height="44"','width="15" height="19"')} ${label}</span>`).join("");
</script>
